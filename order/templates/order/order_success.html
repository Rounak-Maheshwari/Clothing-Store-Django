{% extends 'templates/base.html' %}

{% block content %}

<div class="success-wrapper">

    <div class="success-popup">

        <div class="success-icon-wrapper">

            <div class="success-ring"></div>

            <div class="success-icon">

                ✓

            </div>

        </div>


        <h1 class="success-title">

            Order Placed Successfully

        </h1>

        <p class="success-text">

            Your order has been confirmed and will be shipped soon.

        </p>


        <div class="d-flex justify-content-center gap-3 flex-wrap">

            <a
                href="{% url 'products-list' %}"
                class="continue-btn"
            >

                Continue Shopping

            </a>

            <a
                href="{% url 'order-all_orders' %}"
                class="orders-btn"
            >

                View Orders

            </a>

        </div>

    </div>

</div>

<style>

.success-wrapper {

    min-height: 90vh;

    display: flex;

    align-items: center;

    justify-content: center;

    padding: 40px;

    overflow: hidden;
}

.success-popup {

    width: 100%;

    max-width: 620px;

    background: white;

    border-radius: 40px;

    padding: 70px 50px;

    text-align: center;

    position: relative;

    border: 1px solid #e5e7eb;

    box-shadow:
        0 30px 80px rgba(0,0,0,0.08);

    animation: popupAnimation 0.7s ease;
}

.success-icon-wrapper {

    position: relative;

    width: 170px;

    height: 170px;

    margin: 0 auto 35px;
}

.success-ring {

    position: absolute;

    inset: 0;

    border-radius: 50%;

    background:
        radial-gradient(
            circle,
            rgba(34,197,94,0.15),
            transparent
        );

    animation: pulse 2s infinite;
}

.success-icon {

    width: 140px;

    height: 140px;

    background:
        linear-gradient(
            135deg,
            #22c55e,
            #16a34a
        );

    border-radius: 50%;

    display: flex;

    align-items: center;

    justify-content: center;

    color: white;

    font-size: 72px;

    font-weight: bold;

    position: absolute;

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

    box-shadow:
        0 20px 40px rgba(34,197,94,0.35);

    animation:
        scaleTick 0.7s ease;
}


.success-title {

    font-size: 3rem;

    font-weight: 800;

    color: #111827;

    margin-bottom: 18px;

    letter-spacing: -1px;
}

.success-text {

    font-size: 1.08rem;

    color: #6b7280;

    margin-bottom: 40px;

    line-height: 1.8;
}


.continue-btn {

    background:
        linear-gradient(
            135deg,
            #111827,
            #1f2937
        );

    color: white;

    padding: 15px 30px;

    border-radius: 18px;

    text-decoration: none;

    font-weight: 600;

    box-shadow:
        0 10px 25px rgba(17,24,39,0.15);
}

.orders-btn {

    background: #f3f4f6;

    color: #111827;

    padding: 15px 30px;

    border-radius: 18px;

    text-decoration: none;

    font-weight: 600;

    border: 1px solid #e5e7eb;
}

@keyframes popupAnimation {

    0% {

        opacity: 0;

        transform:
            scale(0.5)
            translateY(80px);
    }

    100% {

        opacity: 1;

        transform:
            scale(1)
            translateY(0);
    }

}

@keyframes scaleTick {

    0% {

        transform:
            translate(-50%, -50%)
            scale(0.3);

        opacity: 0;
    }

    70% {

        transform:
            translate(-50%, -50%)
            scale(1.1);
    }

    100% {

        transform:
            translate(-50%, -50%)
            scale(1);
    }

}

@keyframes pulse {

    0% {

        transform: scale(1);

        opacity: 0.7;
    }

    100% {

        transform: scale(1.4);

        opacity: 0;
    }

}


@media(max-width: 768px) {

    .success-popup {

        padding: 50px 30px;
    }

    .success-title {

        font-size: 2.2rem;
    }

    .success-icon {

        width: 120px;

        height: 120px;

        font-size: 60px;
    }

}

</style>

{% endblock %}
