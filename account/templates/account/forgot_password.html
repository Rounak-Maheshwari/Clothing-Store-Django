{% extends 'templates/base.html' %} {% block content %}

<div
  class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-dark bg-gradient"
>
  <div
    class="card shadow-lg border-0 p-4 rounded-4"
    style="
      width: 420px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    "
  >
    <div class="text-center mb-4">
      <h2 class="fw-bold">Forgot Password</h2>
      <p class="text-muted">Enter your credentials to reset your password</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username:</label>

        <input
          type="text"
          name="username"
          class="form-control rounded-3 py-2"
          placeholder="Enter username"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Email:</label>

        <input
          type="email"
          name="email"
          class="form-control rounded-3 py-2"
          placeholder="Enter email"
        />
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>

        <input
          type="password"
          name="password1"
          class="form-control rounded-3 py-2"
          placeholder="Enter password"
        />
      </div>

      <div class="mb-2">
        <label class="form-label">Confirm Password:</label>

        <input
          type="password"
          name="password2"
          class="form-control rounded-3 py-2"
          placeholder="Confirm your password"
        />
      </div>

      <button type="submit" class="btn btn-dark w-100 py-2 rounded-3">
        Save
      </button>
    </form>
  </div>
</div>
{% endblock %}


{% block title %}
  Forgot Password
{% endblock %}
