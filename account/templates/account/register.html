{% extends 'templates/base.html' %} {% block content %}

<div
  class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-dark bg-gradient"
>
  <div
    class="card shadow-lg border-0 p-4 rounded-4"
    style="
      width: 420px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    "
  >
    <div class="text-center mb-4">
      <h2 class="fw-bold">Create Account</h2>
      <p class="text-muted">Register to continue</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username:</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label">Email:</label>
        {{ form.email }}
      </div>

      <div class="mb-3">
        <label class="form-label">Password:</label>
        {{ form.password1 }}
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password:</label>
        {{ form.password2 }}
      </div>

      <button type="submit" class="btn btn-dark w-100 py-2 rounded-3">
        Register
      </button>
    </form>

    <div class="text-center mt-4">
      <small>
        Already have an account?
        <a href="" class="text-decoration-none fw-semibold"> Login </a>
      </small>
    </div>
  </div>
</div>

{% endblock %}


{% block title %}
  Sign up
{% endblock %}
