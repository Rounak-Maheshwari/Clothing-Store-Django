{% extends 'templates/base.html' %} {% block content %}

<div
  class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-dark bg-gradient"
>
  <div
    class="card shadow-lg border-0 p-5 rounded-4 text-center"
    style="
      width: 420px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    "
  >
    <div class="mb-4">
      <h2 class="fw-bold text-dark">Logout?</h2>
      <p class="text-muted">
        Are you sure you want to logout from your account?
      </p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <button type="submit" class="btn btn-danger w-100 py-2 rounded-3 mb-3">
        Yes, Logout
      </button>
    </form>

    <a href="/" class="btn btn-outline-dark w-100 py-2 rounded-3"> Cancel </a>
  </div>
</div>

{% endblock %}


{% block title %}
    Logout
{% endblock %}
