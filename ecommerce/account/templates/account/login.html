{% extends 'templates/base.html' %} {% block content %}

<div
  class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-dark bg-gradient"
>
  <div
    class="card shadow-lg border-0 p-4 rounded-4"
    style="
      width: 420px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    "
  >
    <div class="text-center mb-4">
      <h2 class="fw-bold">Welcome Back</h2>
      <p class="text-muted">Login to your account</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>

        <input
          type="text"
          name="username"
          class="form-control rounded-3 py-2"
          placeholder="Enter username"
        />
      </div>

      <div class="mb-2">
        <label class="form-label">Email:</label>

        <input
          type="email"
          name="email"
          class="form-control rounded-3 py-2"
          placeholder="Enter email"
        />
      </div>

      <div class="mb-2">
        <label class="form-label">Password:</label>

        <input
          type="password"
          name="password"
          class="form-control rounded-3 py-2"
          placeholder="Enter password"
        />
      </div>

      <div class="text-end mb-3">
        <a
          href="{% url 'account-forgot' %}"
          class="text-decoration-none small text-primary fw-semibold"
        >
          Forgot Password?
        </a>
      </div>

      <button type="submit" class="btn btn-dark w-100 py-2 rounded-3">
        Login
      </button>
    </form>

    <div class="text-center mt-4">
      <small>
        Don't have an account?

        <a
          href="{% url 'account-register' %}"
          class="text-decoration-none fw-semibold"
        >
          Register
        </a>
      </small>
    </div>
  </div>
</div>

{% endblock %}


{% block title %}
    Login
{% endblock %}
